# configs/eval/d_eval.yaml
# =========================
# D.1-D.5 Evaluation configuration.
# Used by: experiments/d_eval.py
#
# Paths override by env: THESIS_OUTPUT_ROOT
# Checkpoint paths must be filled in after training completes.
# Use `output_root` to derive them automatically.

output_root: outputs

# ── Metric suite (D.1) ────────────────────────────────────────────────────────
# Keys must match exactly: auc, eer, fpr_at_tpr95, ece, brier
ece_bins: 15

# ── Video aggregation strategies (D.2) ────────────────────────────────────────
video_strategies: [mean, max, vote]

# ── Threshold sweep (D.3) ─────────────────────────────────────────────────────
# 99 thresholds in [0.01, 0.99]; F1 deliberately excluded from cross-dataset
threshold_sweep:
  n_thresholds: 99
  range: [0.01, 0.99]
  report: [bal_acc, mcc, youden_j]

# ── Bootstrap CIs (D.5) ───────────────────────────────────────────────────────
bootstrap:
  n_resamples: 1000
  confidence_level: 0.95
  resample_unit:
    default: video    # resample over (source, video_id) groups
    dff: sample       # DFF is image-only; resample over samples

# ── Inference settings ────────────────────────────────────────────────────────
batch_size: 8          # actual run: 8 for Stage 1 (ORIGINAL_PARAMS.md §D)
num_workers: 0         # actual run: 0 (launch_pipeline.sh NUM_WORKERS=0)

# ── Manifests (test splits) ───────────────────────────────────────────────────
# Paths are relative to output_root unless absolute.
# Generated by experiments/a2_crop.py
manifests:
  FF++_stage1: outputs/crops/ff++/manifest.csv
  CelebDF:     outputs/crops/celebdf/manifest.csv
  DFDC:        outputs/crops/dfdc/manifest.csv
  DFF:         outputs/crops/dff/manifest.csv

# ── Checkpoints ───────────────────────────────────────────────────────────────
# Each entry: family (model class) + ckpt (path to best.pt)
# These paths are written by the training experiments.
# Fill in after make b1 / make train completes.
checkpoints:
  RGB-Only:
    family: stage1_rgb
    ckpt:   outputs/b1_ablation/checkpoints/best_RGB-Only_seed42.pt
  Residual-Only:
    family: stage1_residual
    ckpt:   outputs/b1_ablation/checkpoints/best_Residual-Only_seed42.pt
  Late-Fusion:
    family: stage1_fusion
    ckpt:   outputs/b1_ablation/checkpoints/best_Late-Fusion_seed42.pt
  A:
    family: stage2
    ckpt:   outputs/c3_regimes/A_seed42/best.pt
  B_pure:
    family: stage2
    ckpt:   outputs/c3_regimes/B_pure_seed42/best.pt
  B_mix:
    family: stage2
    ckpt:   outputs/c3_regimes/B_mix_seed42/best.pt
  C_pure:
    family: stage2
    ckpt:   outputs/c3_regimes/C_pure_seed42/best.pt
  C_mix:
    family: stage2
    ckpt:   outputs/c3_regimes/C_mix_seed42/best.pt
  HIGHDL:
    family: stage2
    ckpt:   outputs/c4_dl_quartile/HIGHDL_seed42/best.pt
  LOWDL:
    family: stage2
    ckpt:   outputs/c4_dl_quartile/LOWDL_seed42/best.pt
