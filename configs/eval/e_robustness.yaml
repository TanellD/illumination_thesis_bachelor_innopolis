# configs/eval/e_robustness.yaml
# ================================
# E — Robustness perturbation grid.
# Used by: experiments/e_robustness.py
#
# Evaluates every checkpoint under all perturbation conditions and writes
# a single long-form CSV:
#   model, dataset, perturbation_family, perturbation_value,
#   auc, eer, fpr_at_tpr95, ece, brier, n_samples

output_root: outputs

batch_size: 8
num_workers: 0

# Manifests — FF++ uses split='test', cross-dataset use split='all'
manifests:
  FF++_stage1:
    csv:   outputs/crops/ff++/manifest.csv
    split: test
  CelebDF:
    csv:   outputs/crops/celebdf/manifest.csv
    split: all
  DFDC:
    csv:   outputs/crops/dfdc/manifest.csv
    split: all
  DFF:
    csv:   outputs/crops/dff/manifest.csv
    split: all

# Checkpoints — flat alias paths written by training scripts
checkpoints:
  RGB-Only:
    family: stage1_rgb
    target_size: 299
    ckpt: outputs/b1_ablation/RGB-Only_seed42/best.pt
  Residual-Only:
    family: stage1_residual
    target_size: 299
    ckpt: outputs/b1_ablation/Residual-Only_seed42/best.pt
  Late-Fusion:
    family: stage1_fusion
    target_size: 299
    ckpt: outputs/b1_ablation/Late-Fusion_seed42/best.pt
  B_mix:
    family: stage2
    target_size: 380
    ckpt: outputs/c3_regimes/B_mix_seed42/best.pt
  C_mix:
    family: stage2
    target_size: 380
    ckpt: outputs/c3_regimes/C_mix_seed42/best.pt
